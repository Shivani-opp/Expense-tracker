<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="index.css" rel="stylesheet">
</head>

<body>
    <div class="search-app-container">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="Expense-tracker  d-flex flex-column ">
                        <h1 class="expense-tracker-heading  ">Expense Tracker</h1>
                        <h3 class="balance-heading">Your Balance</h3>
                        <span class="balance text-center" id="balance"></span>
                    </div>
                    <div>
                        <div class="d-flex flex-row amount-expense-container">
                            <div class="income-card mt-5 ">
                                <h1 class="head">Income</h1>
                                <p class="money" id="income"></p>
                            </div>
                            <div class="Expenses-card mt-5">
                                <h1 class="head">Expenses</h1>
                                <p class="money" id="expenseMoney"></p>
                            </div>
                        </div>
                        <div class="col-12">

                            <form class="transaction-form d-flex flex-column mt-5" id="addTransaction">
                                <h1 class="transaction-heading">Add Transaction</h1>
                                <label for=" description" class="des-head">Description</label>
                                <select id="description" class="des-select">
                                    <option value="Food">Food</option>
                                    <option value="Travel" selected>Travel</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Rent">Rent</option>
                                    <option value="Salary">Salary</option>
                                    <option value="Grocery">Grocery</option>
                                </select>
                                <label for="amount" class="amount-head">Amount</label>
                                <input type="input" class="amount-input" placeholder="Enter amount" id="amount">
                                <button type="submit" class="button mt-3">Add Transaction</button>
                            </form>
                        </div>
                        <div class="col-12">
                            <div class="transaction-history-container mt-4">
                                <h1 class="transaction-history-head">Transaction History</h1>
                                <table id="expenseTable">
                                    <thead>
                                        <tr>
                                            <th>Date</th>
                                            <th>Description</th>

                                            <th>Amount</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tableBody">

                                    </tbody>
                                </table>
                            </div>
                        </div>




                    </div>
                </div>
            </div>


            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
            <script src="index.js"></script>
</body>

</html>
